<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Min-new-tab</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section id="search-container">
      <!-- Search Input -->
      <div id="search-input-wrapper">
        <i id="searchIcon"></i>
        <input type="text" id="search-input" />
        <button
          id="search-btn"
          class="icon-btn"
          data-icon="search"
          aria-label="Search"
        ></button>
      </div>

      <!-- Search Engines -->
      <ul id="search-engines-list" tabindex="-1"></ul>

      <!-- suggestions -->
      <ul id="suggestions-list"></ul>
      <!-- Top websites -->
      <div id="top-website-list-container">
        <ul id="top-website-list" tabindex="-1">
          <li class="link">
            <a href="grok.com">
              <span>grok.com</span>
            </a>
            <div class="actions-btns">
              <button
                tabindex="-1"
                class="icon-btn"
                data-icon="pen"
                title="edit link"
                aria-label="edit link"
                data-id=""
              ></button>
              <button
                tabindex="-1"
                class="icon-btn"
                data-icon="trash"
                title="delete link"
                aria-label="delete link"
                data-id=""
              ></button>
            </div>
          </li>
          <li><span>/</span></li>
        </ul>
        <button id="manage-top-websites-btn">
          <span>Manage</span>
          <span class="icon-btn" data-icon="pen"></span>
        </button>
      </div>
      <div id="add-top-site-input-container">
        <input
          type="text"
          id="add-top-site-input"
          placeholder="add new favourite website"
          data-action="add"
        />
        <button data-icon="plus" class="icon-btn"></button>
      </div>
    </section>

    <!-- Settings -->
    <section id="settings-container">
      <!-- settings panel trigger -->
      <div id="settings-trigger">
        <button
          id="settings-btn"
          class="icon-btn"
          data-icon="settings"
          aria-label="settings"
          title="open settings"
        ></button>
      </div>

      <!-- settings list -->
      <div id="settings-panel" class="hidden">
        <h2>Settings</h2>
        <div id="settingsSeparator" class="title"></div>
        <ul id="settings-options" class="settings-list"></ul>
        <div id="settingsSeparator"></div>
        <ul id="settings-search-engines" class="settings-list"></ul>
      </div>
    </section>

    <script type="module" src="scripts/script.js"></script>
  </body>
</html>
